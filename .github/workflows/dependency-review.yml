# Dependency Review
# Blocks PRs that introduce dependencies with known HIGH/CRITICAL CVEs.
# Also warns (without blocking) when a new dependency scores below 4 on the
# OpenSSF Scorecard — surfacing supply-chain risk for explicit review.
#
# Why this matters:
#   - Catches CVEs at PR time (before they land on main)
#   - Makes adding low-scorecard dependencies a conscious, visible decision
#   - Complements the weekly Trivy and audit scans in ci.yml

name: Dependency Review

on:
  pull_request:
    branches:
      - main

# Top-level: minimal read-only permissions
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level: also needs PR write to post inline diff comments
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Block PRs that introduce HIGH or CRITICAL severity CVEs.
          # Use 'critical' here if you prefer warnings-only for HIGH.
          fail-on-severity: high

          # Warn (do not block) when a newly added dependency has an OpenSSF
          # Scorecard level below 4. The PR still merges — it just makes the
          # low score visible so the author explicitly acknowledges the risk.
          warn-only-on-openssf-scorecard-level: 4
