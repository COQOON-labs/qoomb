name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Explicitly opt into Node.js 24 runtime for all actions.
# Avoids Node.js 20 deprecation warnings from composite actions that
# haven't pinned their own node version yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs

  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    # Needs permissions to read the PR and post status comments
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types from commitlint.config.mjs — keep in sync
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
            perf
            ci
            build
            revert
          # Scope is optional but if provided must be a known package/area
          requireScope: false
          # Single-commit PRs: also validate the commit message matches the title
          # (prevents GitHub's "use commit message" squash merge suggestion from
          # slipping through with a non-conventional message)
          validateSingleCommit: true
          # Dependabot uses the full SHA range in PR titles for pinned actions
          # (e.g. "from abc123... to def456...") but not in the commit message —
          # a known Dependabot limitation with no config-based fix.
          validateSingleCommitMatchesPrTitle: ${{ github.actor != 'dependabot[bot]' }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Block PRs that introduce new HIGH or CRITICAL vulnerabilities.
          # License compliance is handled separately in the quality job via pnpm licenses list.
          fail-on-severity: high
          # Show OpenSSF Scorecard for newly added deps. Warns (does not block)
          # when a dep scores below 4 — makes low-score additions a conscious decision.
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 4

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy

      - name: Security audit
        # Fail CI on HIGH or CRITICAL vulnerabilities.
        # MODERATE/LOW are visible in the output but do not block merging —
        # they are usually transitive dependencies with no upstream fix yet.
        # The npm audit endpoint occasionally returns 500 — retry once, then
        # warn instead of failing CI on transient registry outages.
        run: |
          pnpm audit --audit-level high || {
            exit_code=$?
            if [ $exit_code -eq 1 ]; then
              # exit 1 from pnpm audit = found vulnerabilities → fail CI
              exit 1
            else
              # Other exit codes (e.g. network/registry errors) → warn only
              echo "::warning::pnpm audit failed with exit code $exit_code (likely a registry issue). Skipping."
            fi
          }

      - name: License compliance check
        run: |
          pnpm licenses list --json 2>/dev/null | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));

            // Licenses incompatible with Qoomb's Fair Source / commercial dual-license
            const banned = ['GPL-2.0', 'GPL-3.0', 'AGPL-3.0', 'AGPL-1.0', 'SSPL-1.0', 'EUPL-1.1', 'EUPL-1.2'];
            const violations = [];

            for (const [license, pkgs] of Object.entries(data)) {
              if (banned.some(b => license.toUpperCase().includes(b.toUpperCase()))) {
                violations.push({ license, packages: pkgs.map(p => p.name) });
              }
            }

            if (violations.length) {
              console.error('❌ Banned licenses found:');
              for (const v of violations) {
                console.error('  ' + v.license + ': ' + v.packages.join(', '));
              }
              process.exit(1);
            }
            console.log('✅ All ' + Object.keys(data).length + ' licenses compliant');
          "

      - name: Lint
        run: pnpm run lint

      # Regression pattern Q-003: reject hardcoded admin-role literals in module queries.
      # isAdminRole() from @qoomb/types must be used instead so new roles are never silently missed.
      - name: Check for hardcoded admin-role literals (Q-003)
        run: |
          if grep -rn \
            --include="*.ts" \
            --exclude-dir=node_modules \
            -E "['\"](parent|org_admin)['\"]" \
            apps/api/src/modules/ \
            | grep -v "\.test\.ts" \
            | grep -v "permissions\.ts" \
            | grep -v "person\.utils\.ts"; then
            echo "❌ Hardcoded admin-role literals found in module code."
            echo "   Use isAdminRole() from @qoomb/types instead."
            exit 1
          else
            echo "✅ No hardcoded admin-role literals found."
          fi

      # Regression pattern T-003: every service file must have a companion test file.
      # New services must ship with tests — CI blocks immediately.
      # Existing services without tests are listed in the allowlist below and tracked
      # via T-003 in docs/REGRESSION-PATTERNS.md. Remove entries as tests are added.
      - name: Check for service files without tests (T-003)
        run: |
          # Known tech-debt: these services predate T-003 and tests are being added progressively.
          # DO NOT add new services here — write the test instead.
          allowlist=(
            "apps/api/src/modules/lists/lists.service.ts"
            "apps/api/src/modules/email/email-queue.service.ts"
            "apps/api/src/modules/email/email-renderer.service.ts"
          )
          missing=()
          while IFS= read -r service_file; do
            dir=$(dirname "$service_file")
            base=$(basename "$service_file" .service.ts)
            test_file="$dir/$base.service.test.ts"
            if [ ! -f "$test_file" ]; then
              # Check if this file is in the allowlist
              in_allowlist=false
              for allowed in "${allowlist[@]}"; do
                if [[ "$service_file" == *"$allowed"* ]]; then
                  in_allowlist=true
                  break
                fi
              done
              if [ "$in_allowlist" = false ]; then
                missing+=("$service_file")
              fi
            fi
          done < <(find apps/api/src/modules -name "*.service.ts" ! -name "*.spec.ts")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ New service files without companion test files:"
            for f in "${missing[@]}"; do
              echo "   $f"
            done
            echo ""
            echo "   Create a <name>.service.test.ts next to the service."
            echo "   DO NOT add it to the allowlist in ci.yml — write the test."
            exit 1
          else
            echo "✅ No new service files without tests."
            echo "   (${#allowlist[@]} legacy services still need tests — see T-003 in docs/REGRESSION-PATTERNS.md)"
          fi

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qoomb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qoomb_test

      - name: Prisma migration consistency
        run: |
          cd apps/api
          npx prisma migrate deploy
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma \
            --exit-code \
          || (echo "❌ Prisma schema and migrations are out of sync!" && echo "Run 'pnpm db:migrate:dev' to create a migration for pending changes." && exit 1)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qoomb_test

      - name: Generate JWT RS256 key pair for tests
        run: |
          openssl genpkey -algorithm RSA -out /tmp/jwt-private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in /tmp/jwt-private.pem -out /tmp/jwt-public.pem
          echo "JWT_PRIVATE_KEY=$(base64 -w0 < /tmp/jwt-private.pem)" >> "$GITHUB_ENV"
          echo "JWT_PUBLIC_KEY=$(base64 -w0 < /tmp/jwt-public.pem)" >> "$GITHUB_ENV"
          rm /tmp/jwt-private.pem /tmp/jwt-public.pem

      - name: Run tests
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qoomb_test
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2ktb25seQ== # gitleaks:allow
          KEY_PROVIDER: environment
          NODE_ENV: test

      - name: Enforce coverage thresholds (API)
        run: pnpm --filter @qoomb/api test:cov
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/qoomb_test
          REDIS_URL: redis://localhost:6379
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2ktb25seQ== # gitleaks:allow
          KEY_PROVIDER: environment
          NODE_ENV: test

      - name: Enforce coverage thresholds (validators)
        run: pnpm --filter @qoomb/validators test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@4481f553995cc5011b158ce191746ac1a1d0f815 # v5.5.3
        if: always()
        with:
          files: |
            apps/api/coverage/lcov.info
            packages/validators/coverage/lcov.info
            apps/web/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
