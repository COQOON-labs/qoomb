# Dependabot Configuration
# Automatically checks for dependency updates and creates PRs
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 20
    groups:
      all-non-major:
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 10
    groups:
      all-non-major:
        patterns:
          - '*'
        update-types:
          - 'patch'
          - 'minor'
    labels:
      - 'github-actions'
      - 'automated'
    commit-message:
      prefix: 'ci'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - 'docker'
      - 'automated'
    commit-message:
      prefix: 'chore'
